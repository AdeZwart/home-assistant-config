fan_preset_mode_low:
  sequence:
  - action: fan.set_preset_mode
    metadata: {}
    data:
      preset_mode: Low
    target:
      entity_id: fan.nrg_itho_4d8c_fan
  alias: Fan preset mode low
  description: ''
  icon: mdi:fan-speed-1
